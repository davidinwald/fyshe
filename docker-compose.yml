services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fyshe
      POSTGRES_PASSWORD: fyshe
      POSTGRES_DB: fyshe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fyshe"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: fyshe_test
      POSTGRES_PASSWORD: fyshe_test
      POSTGRES_DB: fyshe_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fyshe_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
