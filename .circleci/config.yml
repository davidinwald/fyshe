version: 2.1

orbs:
  node: circleci/node@6.1.0

executors:
  node-executor:
    docker:
      - image: cimg/node:22.12
    working_directory: ~/fyshe
    environment:
      TURBO_UI: "false"

  node-postgres:
    docker:
      - image: cimg/node:22.12
      - image: cimg/postgres:16.4
        environment:
          POSTGRES_USER: fyshe_test
          POSTGRES_PASSWORD: fyshe_test
          POSTGRES_DB: fyshe_test
    working_directory: ~/fyshe
    environment:
      TURBO_UI: "false"
      DATABASE_URL: postgresql://fyshe_test:fyshe_test@localhost:5432/fyshe_test
      DATABASE_URL_TEST: postgresql://fyshe_test:fyshe_test@localhost:5432/fyshe_test

jobs:
  install:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - restore_cache:
          keys:
            - pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-store-v1-
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
      - persist_to_workspace:
          root: ~/fyshe
          paths:
            - .

  lint:
    executor: node-executor
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Lint
          command: pnpm lint

  typecheck:
    executor: node-executor
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Type Check
          command: pnpm typecheck

  test-unit:
    executor: node-executor
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Unit Tests (validators)
          command: pnpm --filter @fyshe/validators test
      - store_test_results:
          path: test-results

  test-integration:
    executor: node-postgres
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Wait for Postgres
          command: |
            for i in $(seq 1 30); do
              pg_isready -h localhost -U fyshe_test && break
              sleep 1
            done
      - run:
          name: Generate Prisma Client
          command: pnpm db:generate
      - run:
          name: Integration Tests (API)
          command: pnpm --filter @fyshe/api test
      - store_test_results:
          path: test-results

  build:
    executor: node-executor
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Build
          command: pnpm build

  format-check:
    executor: node-executor
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Check formatting
          command: pnpm format:check

  test-e2e:
    executor: node-postgres
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Install Playwright browsers
          command: pnpm --filter @fyshe/web exec playwright install --with-deps chromium
      - run:
          name: Generate Prisma Client
          command: pnpm db:generate
      - run:
          name: Push schema to test DB
          command: pnpm --filter @fyshe/db db:push --force-reset --accept-data-loss
      - run:
          name: E2E Tests
          command: pnpm --filter @fyshe/web test:e2e --project=chromium
          environment:
            AUTH_SECRET: test-secret-for-ci-only
      - store_artifacts:
          path: apps/web/playwright-report
      - store_test_results:
          path: test-results

workflows:
  ci:
    jobs:
      - install
      - lint:
          requires: [install]
      - typecheck:
          requires: [install]
      - test-unit:
          requires: [install]
      - test-integration:
          requires: [install]
      - format-check:
          requires: [install]
      - build:
          requires: [lint, typecheck, test-unit, test-integration, format-check]
      - test-e2e:
          requires: [build]
          filters:
            branches:
              only:
                - main
                - /release\/.*/
