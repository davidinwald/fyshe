version: 2.1

orbs:
  node: circleci/node@6.1.0

executors:
  node-executor:
    docker:
      - image: cimg/node:22.12
    working_directory: ~/fyshe
    environment:
      TURBO_UI: "false"

jobs:
  install:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - restore_cache:
          keys:
            - pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-store-v1-
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
      - persist_to_workspace:
          root: ~/fyshe
          paths:
            - .

  lint:
    executor: node-executor
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Lint
          command: pnpm lint

  typecheck:
    executor: node-executor
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Type Check
          command: pnpm typecheck

  test:
    executor: node-executor
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Unit Tests
          command: pnpm test
      - store_test_results:
          path: test-results

  build:
    executor: node-executor
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Build
          command: pnpm build

  format-check:
    executor: node-executor
    steps:
      - attach_workspace:
          at: ~/fyshe
      - run:
          name: Enable pnpm
          command: corepack enable && corepack prepare pnpm@10.26.0 --activate
      - run:
          name: Check formatting
          command: pnpm format:check

workflows:
  ci:
    jobs:
      - install
      - lint:
          requires: [install]
      - typecheck:
          requires: [install]
      - test:
          requires: [install]
      - format-check:
          requires: [install]
      - build:
          requires: [lint, typecheck, test, format-check]
